<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="よかレッジ！コミュニティスコア - 放課後余暇教育プラットフォーム">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="よかレッジ！">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>よかレッジ！コミュニティスコア</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Unregister any existing service workers to prevent caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>

  <!-- Firebase JS SDK v11.9.1 (ESM) - Pre-load to avoid dynamic import() CSP issues -->
  <!-- firebase_core_web 2.24.0 checks window.firebase_core; if set, skips auto-injection -->
  <script type="module">
    import * as firebase_app from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js';
    import * as firebase_firestore from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js';
    window.firebase_core = firebase_app;
    window.firebase_firestore = firebase_firestore;
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
